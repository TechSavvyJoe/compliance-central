name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Syntax check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Build and verify Web Store package
        run: npm run package
