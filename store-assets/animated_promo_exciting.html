<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Central - Exciting Promo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,900;1,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1200px;
        }

        /* Kinetic Typography Area */
        .kinetic-text {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-size: 140px;
            text-transform: uppercase;
            font-style: italic;
            text-align: center;
            line-height: 1;
            opacity: 0;
            z-index: 100;
            white-space: nowrap;
        }

        /* Red Siren Glow */
        .siren {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(255,0,0,0.4) 0%, rgba(0,0,0,1) 100%);
            opacity: 0;
            z-index: 10;
        }

        /* 3D Browser Window */
        .browser-container {
            position: absolute;
            width: 1100px;
            height: 700px;
            transform-style: preserve-3d;
            transform: translateZ(-2000px) rotateX(40deg) rotateY(20deg);
            opacity: 0;
            z-index: 50;
        }

        .browser-window {
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            border-radius: 16px;
            border: 2px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 100px rgba(59, 130, 246, 0.4), inset 0 0 50px rgba(59, 130, 246, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Browser Header */
        .browser-header {
            height: 50px;
            background-color: #1e293b;
            border-bottom: 2px solid rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }
        .window-controls { display: flex; gap: 8px; }
        .window-controls div { width: 14px; height: 14px; border-radius: 50%; }
        .close { background: #ff5f56; }
        .minimize { background: #ffbd2e; }
        .maximize { background: #27c93f; }

        .address-bar {
            flex-grow: 1;
            background: #0f172a;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            color: #94a3b8;
            font-size: 14px;
        }

        .ext-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 16px;
            color: white;
            box-shadow: 0 0 20px #3b82f6;
            transition: transform 0.1s;
        }

        .ext-icon.pulse {
            animation: pulseIcon 0.5s infinite alternate;
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); box-shadow: 0 0 20px #3b82f6; }
            100% { transform: scale(1.3); box-shadow: 0 0 50px #8b5cf6; }
        }

        /* Abstract UI Inside Browser */
        .browser-body {
            flex-grow: 1;
            display: flex;
            padding: 40px;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .ui-skeleton {
            width: 60%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .ui-block {
            background: rgba(255,255,255,0.05);
            height: 80px;
            border-radius: 10px;
        }
        .ui-block.large { height: 250px; }

        /* The App Side Panel */
        .side-panel {
            position: absolute;
            right: 0; top: 50px; bottom: 0;
            width: 400px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 2px solid rgba(59, 130, 246, 0.5);
            box-shadow: -20px 0 100px rgba(0,0,0,0.8);
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .side-panel.open { transform: translateX(0); }

        .sp-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .fast-scan {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            transform: translateX(50px);
            opacity: 0;
        }

        .fast-scan .title { font-size: 18px; font-weight: 600; }
        
        .huge-check {
            position: absolute;
            right: 20px; top: 15px;
            font-size: 32px;
            color: #10b981;
            opacity: 0;
            transform: scale(3);
        }

        @keyframes slamCheck {
            0% { opacity: 0; transform: scale(5); }
            50% { opacity: 1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: white;
            opacity: 0;
            z-index: 1000;
            pointer-events: none;
        }

        /* Final Logo Reveal */
        .final-reveal {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #050505;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
        }

        .final-logo {
            font-family: 'Montserrat', sans-serif;
            font-size: 80px;
            font-weight: 900;
            background: linear-gradient(to right, #3b82f6, #8b5cf6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            transform: scale(0.5);
            opacity: 0;
        }

        .final-sub {
            font-size: 32px;
            font-weight: 600;
            color: #fff;
            transform: translateY(20px);
            opacity: 0;
        }

    </style>
</head>
<body>

    <!-- Kinetic Text -->
    <div class="kinetic-text" id="k1">COMPLIANCE</div>
    <div class="kinetic-text" id="k2">IS</div>
    <div class="kinetic-text" id="k3">BORING</div>
    <div class="kinetic-text" id="k4" style="color: #ef4444;">BUT FINES<br>AREN'T.</div>

    <div class="siren" id="siren"></div>
    <div class="flash-overlay" id="flash"></div>

    <!-- 3D Browser -->
    <div class="browser-container" id="browserCont">
        <div class="browser-window">
            <div class="browser-header">
                <div class="window-controls">
                    <div class="close"></div>
                    <div class="minimize"></div>
                    <div class="maximize"></div>
                </div>
                <div class="address-bar">https://dealership-dms.michigan.com</div>
                <div class="ext-icon" id="extIcon"><img src="../icons/icon32.png" alt="CC" style="width: 24px; height: 24px;"></div>
            </div>
            <div class="browser-body">
                <div class="ui-skeleton">
                    <div class="ui-block large"></div>
                    <div class="ui-block"></div>
                    <div class="ui-block"></div>
                </div>
                
                <div class="side-panel" id="sidePanel">
                    <div class="sp-header">
                        <img src="../icons/icon48.png" alt="Logo" style="width: 32px; height: 32px; margin-right: 10px; vertical-align: middle;">
                        <span style="vertical-align: middle;">COMPLIANCE<br>CENTRAL</span>
                    </div>
                    
                    <div class="fast-scan" id="scan1">
                        <div class="title">OFAC SANCTIONS</div>
                        <div class="huge-check" id="check1">✔</div>
                    </div>
                    <div class="fast-scan" id="scan2">
                        <div class="title">REPEAT OFFENDER</div>
                        <div class="huge-check" id="check2">✔</div>
                    </div>
                    <div class="fast-scan" id="scan3">
                        <div class="title">TITLE & LIEN DB</div>
                        <div class="huge-check" id="check3">✔</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="final-reveal" id="finalReveal">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <img src="../icons/icon128.png" alt="Logo" style="width: 80px; height: 80px; margin-right: 20px;" class="final-logo" id="fLogoImg">
            <div class="final-logo" id="fLogo">COMPLIANCE CENTRAL</div>
        </div>
        <div class="final-sub" id="fSub">INSTALL NOW ON CHROME WEB STORE</div>
    </div>

    <script>
        const sleep = ms => new Promise(res => setTimeout(res, ms));

        async function slamText(id, duration) {
            const el = document.getElementById(id);
            el.style.transition = 'none';
            el.style.opacity = '1';
            el.style.transform = 'scale(3)';
            
            // Trigger reflow
            void el.offsetWidth;
            
            el.style.transition = 'transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            el.style.transform = 'scale(1)';
            
            await sleep(duration);
            el.style.opacity = '0';
        }

        async function flashScreen() {
            const f = document.getElementById('flash');
            f.style.transition = 'none';
            f.style.opacity = '1';
            await sleep(50);
            f.style.transition = 'opacity 0.5s';
            f.style.opacity = '0';
        }

        async function runExcitingSequence() {
            await sleep(500);

            // Intro Kinetic Typography
            await slamText('k1', 600);
            await slamText('k2', 400);
            await slamText('k3', 800);
            
            // Siren section
            const siren = document.getElementById('siren');
            siren.style.opacity = '1';
            await slamText('k4', 1500);
            siren.style.opacity = '0';

            // Flash transition to browser
            await flashScreen();

            // Bring in 3D Browser
            const bc = document.getElementById('browserCont');
            bc.style.transition = 'all 1s cubic-bezier(0.25, 1, 0.5, 1)';
            bc.style.opacity = '1';
            bc.style.transform = 'translateZ(0) rotateX(0deg) rotateY(0deg)';
            
            await sleep(1500);

            // Pulse extension icon
            const ext = document.getElementById('extIcon');
            ext.classList.add('pulse');
            await sleep(1000);
            ext.classList.remove('pulse');

            // Open Side Panel
            document.getElementById('sidePanel').classList.add('open');
            await sleep(800);

            // Rapid Scans
            const scans = ['scan1', 'scan2', 'scan3'];
            const checks = ['check1', 'check2', 'check3'];

            for (let i=0; i<3; i++) {
                const s = document.getElementById(scans[i]);
                s.style.transition = 'all 0.3s ease-out';
                s.style.opacity = '1';
                s.style.transform = 'translateX(0)';
                await sleep(300);
                
                const c = document.getElementById(checks[i]);
                c.style.animation = 'slamCheck 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';
                
                // Mini flash
                s.style.background = 'rgba(16, 185, 129, 0.2)';
                s.style.borderColor = '#10b981';
                await sleep(400);
            }

            await sleep(1000);

            // Zoom into extension icon to transition to final logo
            bc.style.transition = 'all 0.8s cubic-bezier(0.55, 0.055, 0.675, 0.19)';
            bc.style.transform = 'scale(5) translateZ(500px)';
            bc.style.opacity = '0';

            await sleep(600);

            // Final Reveal
            const fr = document.getElementById('finalReveal');
            fr.style.opacity = '1';

            const fLogo = document.getElementById('fLogo');
            const fLogoImg = document.getElementById('fLogoImg');
            
            fLogo.style.transition = 'all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            fLogo.style.opacity = '1';
            fLogo.style.transform = 'scale(1)';

            fLogoImg.style.transition = 'all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            fLogoImg.style.opacity = '1';
            fLogoImg.style.transform = 'scale(1)';

            await sleep(500);

            const fSub = document.getElementById('fSub');
            fSub.style.transition = 'all 0.5s ease-out';
            fSub.style.opacity = '1';
            fSub.style.transform = 'translateY(0)';

        }

        window.onload = runExcitingSequence;
    </script>
</body>
</html>
