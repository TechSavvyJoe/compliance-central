name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: Lint
        run: npm run lint
      - name: Syntax check
        run: npm run check
      - name: Tests
        run: npm test
      - name: Build and verify Web Store package
        run: npm run package
